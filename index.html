<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Amor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Dancing+Script:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at bottom, #2d0b3f 0%, #05020a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Cinzel', serif;
            color: #fff;
            perspective: 1000px;
            padding: 1px 0; /* Evita colapso de márgenes */
        }

        .nebula {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 40%, rgba(255, 0, 127, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 80% 60%, rgba(79, 13, 163, 0.12) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .glass-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.6), inset 0 0 80px rgba(255, 50, 100, 0.05);
            max-width: 700px;
            width: 95%;
            margin: 5vh auto 10vh auto;
            animation: float 6s ease-in-out infinite;
            transform-style: preserve-3d;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hide-card {
            opacity: 0 !important;
            transform: scale(0.8) translateZ(-100px) !important;
            pointer-events: none;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff007f, #7928ca, #ff007f);
            z-index: -1;
            border-radius: 32px;
            opacity: 0.2;
            filter: blur(20px);
            animation: pulseGlow 4s linear infinite alternate;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.8rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #ff9a9e, #fecfef, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 0, 127, 0.5);
            letter-spacing: 3px;
            transform: translateZ(50px);
        }

        p {
            font-size: 1.25rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            font-weight: 300;
            transform: translateZ(30px);
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotateY(var(--rx, 0deg)) rotateX(var(--ry, 0deg));
            }

            50% {
                transform: translateY(-15px) rotateY(var(--rx, 0deg)) rotateX(var(--ry, 0deg));
            }

            100% {
                transform: translateY(0px) rotateY(var(--rx, 0deg)) rotateX(var(--ry, 0deg));
            }
        }

        @keyframes pulseGlow {
            0% {
                opacity: 0.15;
                filter: blur(20px);
            }

            100% {
                opacity: 0.4;
                filter: blur(35px);
            }
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 3rem;
            transform: translateZ(40px);
        }

        .heart-btn {
            background: linear-gradient(135deg, #ff007f, #ff4d4d);
            border: none;
            padding: 16px 35px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .album-btn {
            background: linear-gradient(135deg, #7928ca, #ff007f);
            box-shadow: 0 8px 25px rgba(121, 40, 202, 0.5);
        }

        .heart-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .heart-btn:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 0, 127, 0.7);
        }

        .album-btn:hover {
            box-shadow: 0 15px 35px rgba(121, 40, 202, 0.7);
        }

        .heart-btn:hover::after {
            left: 100%;
            opacity: 1;
        }

        .heart-btn:active {
            transform: scale(0.95);
        }

        /* Mouse Follower */
        #cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 127, 0.12) 0%, rgba(0, 0, 0, 0) 60%);
            pointer-events: none;
            z-index: 5;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        /* Texto Gigante Te Amo */
        #te-amo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-family: 'Dancing Script', cursive;
            font-size: 10rem;
            color: transparent;
            background: linear-gradient(to right, #ff7eb3, #ff758c, #ff007f);
            -webkit-background-clip: text;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 60px rgba(255, 0, 127, 0.8);
            text-align: center;
            white-space: nowrap;
        }

        .show-te-amo {
            opacity: 1 !important;
            transform: translate(-50%, -50%) scale(1) !important;
            animation: textPulse 1.5s infinite alternate ease-in-out;
        }

        @keyframes textPulse {
            0% {
                filter: brightness(1);
                text-shadow: 0 0 40px rgba(255, 0, 127, 0.6);
            }

            100% {
                filter: brightness(1.3);
                text-shadow: 0 0 90px rgba(255, 0, 127, 1);
            }
        }

        /* ROMPECABEZAS & VAULT MODALS */
        #puzzle-modal,
        #vault-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: rgba(10, 2, 20, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: block;
            overflow-y: auto;
            padding: 10vh 15px 5vh 15px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 2px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
            margin: 30px auto;
            width: fit-content;
            transition: gap 0.5s ease;
        }

        .puzzle-piece {
            width: 100px;
            height: 100px;
            background-size: 300px 300px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-radius: 4px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4);
        }

        .puzzle-piece:hover {
            transform: scale(0.95);
        }

        .puzzle-piece.selected {
            box-shadow: 0 0 20px #fff, inset 0 0 10px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            border: 3px solid #fff;
            z-index: 10;
        }

        .puzzle-instructions {
            color: white;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            text-align: center;
            max-width: 80%;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
        }

        /* ALBUM MODAL */
        #album-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: rgba(10, 2, 20, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: block;
            overflow-y: auto;
            text-align: center;
            padding: 10vh 15px 5vh 15px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hidden-album {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9) translateZ(-50px);
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            background: none;
            border: none;
            color: white;
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.8);
            z-index: 110;
        }

        .close-btn:hover {
            transform: scale(1.2) rotate(90deg);
            color: #ff4d4d;
        }

        .gallery-title {
            position: absolute;
            top: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            background: linear-gradient(to right, #fecfef, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
        }

        .gallery {
            display: flex;
            gap: 40px;
            padding: 40px;
            width: 100%;
            height: 100%;
            overflow-x: auto;
            align-items: center;
            scrollbar-width: none;
            /* Firefox */
        }

        .gallery::-webkit-scrollbar {
            display: none;
            /* Chrome */
        }

        .polaroid {
            background: #fff;
            padding: 15px 15px 50px 15px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 0, 127, 0.2);
            flex-shrink: 0;
            transform: rotate(var(--rot)) scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
            cursor: pointer;
        }

        .polaroid img {
            max-height: 50vh;
            max-width: 80vw;
            object-fit: cover;
            border-radius: 2px;
            pointer-events: none;
        }

        .polaroid-caption {
            color: #222;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            text-align: center;
            margin-top: 15px;
            margin-bottom: 0;
            text-shadow: none;
            transform: none;
            line-height: 1.3;
            font-weight: bold;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }

        .polaroid:hover {
            transform: scale(1.05) rotate(0deg) !important;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 0, 127, 0.5);
            z-index: 50;
        }

        .empty-msg {
            color: white;
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            text-align: center;
            margin: auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 0, 127, 0.3);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.2);
        }

        .empty-msg span {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #ff4d4d;
        }

        @media (max-width: 768px) {
            #te-amo-text {
                font-size: 4.5rem;
                white-space: normal;
                width: 90vw;
            }

            .buttons {
                flex-direction: column;
                gap: 15px;
            }

            h1 {
                font-size: 3.5rem;
            }

            .gallery-title {
                font-size: 2.5rem;
                top: 20px;
            }

            .close-btn {
                top: 15px;
                right: 20px;
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>

    <div class="nebula"></div>
    <div id="cursor-glow"></div>
    <canvas id="canvas-container"></canvas>

    <div id="te-amo-text">¡Te Amo Angeles!</div>

    <div class="glass-card" id="card">
        <h1>Mi Universo mi ojitos de gato</h1>
        <p>En esta galaxia infinita llena de corazones, tú eres mi constelación favorita. Un universo creado solo para
            ti.</p>
        <div class="buttons">
            <button class="heart-btn" id="magic-btn">Explosión de Amor</button>
            <button class="heart-btn album-btn" id="album-btn">Álbum de Recuerdos</button>
            <button class="heart-btn puzzle-btn" id="puzzle-btn"
                style="background: linear-gradient(135deg, #f093fb, #f5576c);">Jugar </button>
            <button class="heart-btn" id="vault-btn"
                style="background: linear-gradient(135deg, #11998e, #38ef7d);">Mensaje Secreto</button>
        </div>

        <div id="love-timer"
            style="margin-top: 30px; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="font-family: 'Cinzel', serif; margin-bottom: 5px; font-size: 1rem; color: #ccc;">Nuestra
                ultima vez:</h3>
            <div id="timer-display"
                style="font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: #ffeb3b; text-shadow: 0 0 10px rgba(255,235,59,0.5);">
            </div>
        </div>
    </div>

    <!-- Rompecabezas Modal -->
    <div id="puzzle-modal" class="hidden-album">
        <h2 class="gallery-title">Nuestro Rompecabezas</h2>
        <button id="close-puzzle" class="close-btn">&times;</button>
        <p class="puzzle-instructions">Toca una pieza y luego otra para intercambiarlas </p>
        <div id="puzzle-board"></div>
        <button class="heart-btn" id="shuffle-btn" style="margin-top:30px; font-size:1rem; padding:10px 25px;">Mezclar
            de nuevo</button>
    </div>

    <!-- Mensaje Secreto Modal -->
    <div id="vault-modal" class="hidden-album">
        <h2 class="gallery-title" style="color: #38ef7d; text-shadow: 0 0 15px #11998e;">Candado Secreto</h2>
        <button id="close-vault" class="close-btn">&times;</button>

        <div id="vault-content" style="text-align: center; color: white; margin: 0 auto;">
            <!-- Se llena dinámicamente con JS -->
        </div>
    </div>

    <!-- Álbum de Recuerdos Modal -->
    <div id="album-container" class="hidden-album">
        <h2 class="gallery-title">Nuestros Recuerdos</h2>
        <button id="close-album" class="close-btn">&times;</button>
        <div class="gallery" id="gallery">
            <!-- Las fotos se cargarán aquí automáticamente -->
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let hearts = [];
        let planets = [];
        let isWarping = false;
        let warpFactor = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Heart Drawing Path function
        function drawHeart(ctx, x, y, size, color, opacity, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.scale(size, size);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-50, -50, -100, 0, 0, 50);
            ctx.bezierCurveTo(100, 0, 50, -50, 0, 0);
            ctx.fillStyle = `rgba(${color}, ${opacity})`;
            ctx.shadowColor = `rgba(${color}, ${opacity})`;
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.restore();
        }

        // Particle System for 3D Stars
        class Star {
            constructor() {
                this.reset(true);
            }
            reset(randomZ = false) {
                this.x = (Math.random() - 0.5) * width * 4;
                this.y = (Math.random() - 0.5) * height * 4;
                this.z = randomZ ? Math.random() * width * 2 : width * 2;
                this.isHeart = Math.random() > 0.6; // 40% are tiny hearts
                this.rotation = Math.random() * Math.PI * 2;
                this.color = Math.random() > 0.85 ? '#ffccf2' : (Math.random() > 0.5 ? '#e6f2ff' : '#ff99cc');
            }
            update() {
                let speed = isWarping ? 15 + warpFactor * 80 : 0.4;
                this.z -= speed;
                if (this.z <= 1) {
                    this.reset(false);
                }

                let fov = 300;
                let scale = fov / this.z;

                // Parallax 
                let parallaxX = (mouseX - width / 2) * (1 - scale) * 0.05;
                let parallaxY = (mouseY - height / 2) * (1 - scale) * 0.05;

                this.sx = this.x * scale + width / 2 + parallaxX;
                this.sy = this.y * scale + height / 2 + parallaxY;
                this.scale = scale;
            }
            draw() {
                let radius = this.scale * 2.5;
                if (radius < 0.1 || radius > 50) return;
                if (this.sx < 0 || this.sx > width || this.sy < 0 || this.sy > height) return;

                let opacity = Math.min(1, this.scale * 2);

                if (this.isHeart) {
                    drawHeart(ctx, this.sx, this.sy, radius * 0.05, this.hexToRgb(this.color), opacity, this.rotation);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.sx, this.sy, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.hexToRgb(this.color)}, ${opacity})`;
                    ctx.fill();
                }
            }
            hexToRgb(hex) {
                let r = 255, g = 255, b = 255;
                if (hex === '#ffccf2') { r = 255; g = 204; b = 242; }
                else if (hex === '#e6f2ff') { r = 230; g = 242; b = 255; }
                else if (hex === '#ff99cc') { r = 255; g = 153; b = 204; }
                return `${r},${g},${b}`;
            }
        }

        // Planet Class for the 3D Tour
        class Planet {
            constructor() {
                this.reset(true);
            }
            reset(randomZ = false) {
                this.x = (Math.random() - 0.5) * width * 5;
                this.y = (Math.random() - 0.5) * height * 5;
                this.z = randomZ ? Math.random() * width * 4 + width : width * 4;
                this.baseSize = Math.random() * 150 + 60; // Planet size
                this.color1 = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.color2 = `hsl(${Math.random() * 360}, 90%, 15%)`;
                this.hasRing = Math.random() > 0.5;
                this.ringColor = `rgba(255, 255, 255, 0.25)`;
                this.ringAngle = Math.random() * Math.PI;
            }
            update() {
                let speed = isWarping ? 15 + warpFactor * 80 : 0.4;
                this.z -= speed;
                if (this.z <= 1) {
                    this.reset(false);
                }

                let fov = 300;
                let scale = fov / this.z;

                let parallaxX = (mouseX - width / 2) * (1 - scale) * 0.05;
                let parallaxY = (mouseY - height / 2) * (1 - scale) * 0.05;

                this.sx = this.x * scale + width / 2 + parallaxX;
                this.sy = this.y * scale + height / 2 + parallaxY;
                this.scale = scale;
            }
            draw() {
                if (warpFactor < 0.05) return; // Only show during warp tour

                let radius = this.baseSize * this.scale;

                // Don't draw if offscreen or too small
                if (radius < 0.5 || this.sx < -radius * 3 || this.sx > width + radius * 3 || this.sy < -radius * 3 || this.sy > height + radius * 3) return;

                let opacity = Math.min(1, warpFactor * 1.5);

                ctx.save();
                ctx.globalAlpha = opacity;
                ctx.translate(this.sx, this.sy);

                // Ring Back
                if (this.hasRing) {
                    ctx.rotate(this.ringAngle);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, radius * 2.2, radius * 0.35, 0, Math.PI, Math.PI * 2);
                    ctx.strokeStyle = this.ringColor;
                    ctx.lineWidth = radius * 0.15;
                    ctx.stroke();
                    ctx.rotate(-this.ringAngle);
                }

                // Planet Body
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                let grad = ctx.createRadialGradient(-radius * 0.3, -radius * 0.3, radius * 0.1, 0, 0, radius);
                grad.addColorStop(0, this.color1);
                grad.addColorStop(1, this.color2);
                ctx.fillStyle = grad;
                ctx.fill();

                // Ring Front
                if (this.hasRing) {
                    ctx.rotate(this.ringAngle);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, radius * 2.2, radius * 0.35, 0, 0, Math.PI);
                    ctx.strokeStyle = this.ringColor;
                    ctx.lineWidth = radius * 0.15;
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        class FloatingHeart {
            constructor(x, y, isExplosion = false) {
                this.x = x || Math.random() * width;
                this.y = y || height + 100;
                this.size = Math.random() * 0.25 + 0.1;
                this.speedY = isExplosion ? (Math.random() - 1) * 6 - 3 : Math.random() * -1.5 - 0.5;
                this.speedX = isExplosion ? (Math.random() - 0.5) * 10 : Math.sin(this.y * 0.01) * 0.8;
                this.opacity = isExplosion ? 1 : Math.random() * 0.4 + 0.1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.colors = ['255, 0, 127', '255, 77, 120', '255, 102, 178', '178, 102, 255', '255, 153, 204'];
                this.color = this.colors[Math.floor(Math.random() * this.colors.length)];
                this.life = isExplosion ? 150 : Infinity;
                this.isExplosion = isExplosion;
            }
            update() {
                this.y += this.speedY;
                this.x += this.isExplosion ? this.speedX : Math.sin(this.y * 0.02) * 1.5;
                this.rotation += this.rotationSpeed;

                if (this.isExplosion) {
                    this.life--;
                    this.opacity -= 0.006;
                    this.size *= 0.985;
                    this.speedY += 0.03; // gravity
                }

                if (!this.isExplosion && this.y < -100) {
                    this.y = height + 100;
                    this.x = Math.random() * width;
                }
            }
            draw() {
                if (this.opacity <= 0) return;
                drawHeart(ctx, this.x, this.y, this.size, this.color, this.opacity, this.rotation);
            }
        }

        // Initialize Universe
        for (let i = 0; i < 400; i++) particles.push(new Star());
        for (let i = 0; i < 15; i++) planets.push(new Planet());
        for (let i = 0; i < 50; i++) hearts.push(new FloatingHeart());

        // Mouse interaction
        let mouseX = width / 2;
        let mouseY = height / 2;
        let targetXAxis = 0;
        let targetYAxis = 0;
        let currentXAxis = 0;
        let currentYAxis = 0;

        const cursorGlow = document.getElementById('cursor-glow');
        const card = document.getElementById('card');

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            cursorGlow.style.left = mouseX + 'px';
            cursorGlow.style.top = mouseY + 'px';

            targetXAxis = (window.innerWidth / 2 - mouseX) / 30;
            targetYAxis = (window.innerHeight / 2 - mouseY) / 30;
        });

        window.addEventListener('mouseleave', () => {
            targetXAxis = 0;
            targetYAxis = 0;
        });

        // Click magic button for the TOUR
        document.getElementById('magic-btn').addEventListener('click', (e) => {
            if (isWarping) return; // Prevent spam clicking

            const teAmoText = document.getElementById('te-amo-text');

            // Hide card
            card.classList.add('hide-card');

            setTimeout(() => {
                isWarping = true;

                const phrases = ["¡Te Amo Angeles!", "¡Me encantas!", "Eres mi reina 👑", "Mi rrua ❤️"];
                let phraseIndex = 0;

                teAmoText.innerText = phrases[phraseIndex];
                teAmoText.classList.add('show-te-amo');

                // Explode hearts
                for (let i = 0; i < 100; i++) {
                    hearts.push(new FloatingHeart(width / 2, height / 2, true));
                }

                // Reset planets far away so they zoom in during the tour
                planets.forEach(p => p.reset(true));

                const phraseInterval = setInterval(() => {
                    phraseIndex++;
                    if (phraseIndex < phrases.length) {
                        teAmoText.classList.remove('show-te-amo');
                        setTimeout(() => {
                            teAmoText.innerText = phrases[phraseIndex];
                            teAmoText.classList.add('show-te-amo');

                            // More hearts explosion for each new phrase
                            for (let i = 0; i < 40; i++) {
                                hearts.push(new FloatingHeart(width / 2, height / 2, true));
                            }
                        }, 500); // Wait for fade out to finish
                    }
                }, 2800);

                // End the tour after sequence finishes
                setTimeout(() => {
                    clearInterval(phraseInterval);
                    isWarping = false;
                    teAmoText.classList.remove('show-te-amo');

                    // Show card again after tour ends
                    setTimeout(() => {
                        card.classList.remove('hide-card');
                    }, 1500);
                }, 11500);

            }, 400); // Wait for card to hide
        });

        // ÁLBUM DE FOTOS LOGIC
        const albumBtn = document.getElementById('album-btn');
        const albumContainer = document.getElementById('album-container');
        const closeAlbum = document.getElementById('close-album');
        const gallery = document.getElementById('gallery');
        let albumLoaded = false;

        const albumAudio = new Audio('Download-_1_.mp3');
        albumAudio.loop = true;

        albumBtn.addEventListener('click', () => {
            albumContainer.classList.remove('hidden-album');

            albumAudio.play().catch(e => console.log("El audio no pudo reproducirse automáticamente:", e));

            if (!albumLoaded) {
                loadPhotos();
                albumLoaded = true;
            }
        });

        closeAlbum.addEventListener('click', () => {
            albumContainer.classList.add('hidden-album');
            albumAudio.pause();
        });

        function loadPhotos() {
            let foundAny = false;
            const maxPhotosToTry = 30;

            // Nombres específicos y sus mensajes bonitos
            const specificImages = [
                { name: "WhatsApp Image 2026-05-12 at 8.46.37 PM.jpeg", text: "Me haces sonreír como nadie más puede." },
                { name: "WhatsApp Image 2026-05-12 at 8.57.43 PM.jpeg", text: "Eres la casualidad más hermosa que me ha sucedido." },
                { name: "WhatsApp Image 2026-05-13 at 9.12.12 PM.jpeg", text: "En tu sonrisa encuentro toda la paz que necesito." },
                { name: "WhatsApp Image 2026-05-15 at 9.50.29 PM.jpeg", text: "Cada instante contigo se convierte en un recuerdo inolvidable." },
                { name: "WhatsApp Image 2026-05-15 at 9.50.50 PM.jpeg", text: "Mi amor, vales mucho por lo que eres. Tú puedes, aquí estaré." },
                { name: "WhatsApp Image 2026-05-15 at 9.51.14 PM.jpeg", text: "Mi lugar favorito en el mundo es a tu lado." },
                { name: "WhatsApp Image 2026-05-15 at 9.51.45 PM.jpeg", text: "Se me hizo vicio ver tus ojos ✨" }
            ];

            specificImages.forEach(item => {
                const img = new Image();
                img.src = `fotos/${item.name}`;
                img.onload = () => {
                    foundAny = true;
                    addPolaroid(img.src, item.text);
                    checkEmptyMessage();
                };
            });

            const genericMessages = [
                "Contigo todo es más bonito.",
                "Esa mirada lo dice todo.",
                "Haces que mi mundo brille.",
                "Tú y yo, mi historia favorita.",
                "Eres mi obra de arte favorita.",
                "Simplemente perfecta.",
                "Me encanta todo de ti."
            ];

            for (let i = 1; i <= maxPhotosToTry; i++) {
                // Try to load common extensions
                const img = new Image();
                img.src = `fotos/${i}.jpg`;

                img.onload = () => {
                    foundAny = true;
                    const randomMsg = genericMessages[Math.floor(Math.random() * genericMessages.length)];
                    addPolaroid(img.src, randomMsg);
                    checkEmptyMessage();
                };

                img.onerror = () => {
                    if (img.src.includes('.jpg')) {
                        img.src = `fotos/${i}.png`; // Try PNG
                    } else if (img.src.includes('.png')) {
                        img.src = `fotos/${i}.jpeg`; // Try JPEG
                    }
                };
            }

            // Fallback message if no photos are found after a short delay
            setTimeout(() => {
                checkEmptyMessage(foundAny);
            }, 1000);
        }

        function checkEmptyMessage(found = true) {
            const msgEl = document.getElementById('empty-msg');
            if (found) {
                if (msgEl) msgEl.remove();
            } else if (!msgEl && gallery.children.length === 0) {
                gallery.innerHTML = `
                    <div id="empty-msg" class="empty-msg">
                        <span>Oops!</span><br><br>
                        Parece que la carpeta "fotos" está vacía o los nombres no coinciden.<br><br>
                        Para que aparezcan aquí, guarda tus imágenes en la carpeta <b>fotos</b><br>
                        con los nombres: <b>1.jpg, 2.jpg, 3.jpg</b>... etc.
                    </div>
                `;
            }
        }

        function addPolaroid(src, captionText = "") {
            const div = document.createElement('div');
            div.className = 'polaroid';
            // Random rotation between -12deg and 12deg
            const rot = (Math.random() - 0.5) * 24;
            div.style.setProperty('--rot', `${rot}deg`);

            const imgEl = document.createElement('img');
            imgEl.src = src;
            div.appendChild(imgEl);

            if (captionText) {
                const p = document.createElement('p');
                p.className = 'polaroid-caption';
                p.innerText = captionText;
                div.appendChild(p);
            }

            gallery.appendChild(div);

            // Allow horizontal scrolling using mouse wheel
            gallery.addEventListener('wheel', (evt) => {
                evt.preventDefault();
                gallery.scrollLeft += evt.deltaY;
            });
        }


        // ROMPECABEZAS LOGIC
        const puzzleBtn = document.getElementById('puzzle-btn');
        const puzzleModal = document.getElementById('puzzle-modal');
        const closePuzzle = document.getElementById('close-puzzle');
        const puzzleBoard = document.getElementById('puzzle-board');
        const shuffleBtn = document.getElementById('shuffle-btn');

        let puzzlePieces = [];
        let selectedPiece = null;
        let puzzleImageNoText = null;
        let puzzleImageWithText = null;

        puzzleBtn.addEventListener('click', () => {
            puzzleModal.classList.remove('hidden-album');
            if (!puzzleImageNoText) {
                puzzleImageNoText = createPuzzleImage(false);
                puzzleImageWithText = createPuzzleImage(true);
                initPuzzle();
            }
        });

        closePuzzle.addEventListener('click', () => {
            puzzleModal.classList.add('hidden-album');
        });

        shuffleBtn.addEventListener('click', initPuzzle);

        function createPuzzleImage(withText) {
            const pCanvas = document.createElement('canvas');
            pCanvas.width = 300;
            pCanvas.height = 300;
            const pctx = pCanvas.getContext('2d');

            // 1. Fondo oscuro como el espacio
            pctx.fillStyle = '#11052C';
            pctx.fillRect(0, 0, 300, 300);

            // 2. Estrellitas de fondo
            for (let i = 0; i < 50; i++) {
                pctx.fillStyle = 'rgba(255, 255, 255, ' + (Math.random() * 0.8) + ')';
                pctx.beginPath();
                pctx.arc(Math.random() * 300, Math.random() * 300, Math.random() * 1.5, 0, Math.PI * 2);
                pctx.fill();
            }

            // 3. Corazón Gigante Brillante
            pctx.save();
            pctx.shadowColor = 'rgba(255, 0, 127, 0.8)';
            pctx.shadowBlur = 25;
            drawHeart(pctx, 150, 110, 2.6, '255,20,100', 1, 0); // Corazón grande
            pctx.shadowBlur = 0;
            drawHeart(pctx, 150, 115, 2.0, '255,70,140', 1, 0); // Corazón interior para dar profundidad
            pctx.restore();

            // 4. Texto J & A solo si se solicita
            if (withText) {
                pctx.fillStyle = '#ffffff';
                pctx.font = 'bold 75px "Dancing Script"';
                pctx.textAlign = 'center';
                pctx.textBaseline = 'middle';
                pctx.shadowColor = 'rgba(0,0,0,0.8)';
                pctx.shadowBlur = 10;
                pctx.fillText('J y A', 150, 140);
            }

            return pCanvas.toDataURL();
        }

        function initPuzzle() {
            puzzleBoard.innerHTML = '';
            puzzlePieces = [0, 1, 2, 3, 4, 5, 6, 7, 8];
            // Shuffle ensuring it's not solved immediately
            for (let i = puzzlePieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [puzzlePieces[i], puzzlePieces[j]] = [puzzlePieces[j], puzzlePieces[i]];
            }
            selectedPiece = null;
            puzzleBoard.style.gap = '2px';
            renderPuzzle();
        }

        function renderPuzzle() {
            puzzleBoard.innerHTML = '';
            puzzlePieces.forEach((correctId, index) => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.style.backgroundImage = `url(${puzzleImageNoText})`;

                const row = Math.floor(correctId / 3);
                const col = correctId % 3;
                piece.style.backgroundPosition = `-${col * 100}px -${row * 100}px`;

                if (selectedPiece === index) {
                    piece.classList.add('selected');
                }

                piece.addEventListener('click', () => handlePieceClick(index));
                puzzleBoard.appendChild(piece);
            });
            checkWin();
        }

        function handlePieceClick(index) {
            // Prevent interaction if already won
            if (puzzlePieces.every((val, i) => val === i)) return;

            if (selectedPiece === null) {
                selectedPiece = index;
            } else {
                if (selectedPiece !== index) {
                    [puzzlePieces[selectedPiece], puzzlePieces[index]] = [puzzlePieces[index], puzzlePieces[selectedPiece]];
                }
                selectedPiece = null;
            }
            renderPuzzle();
        }

        function checkWin() {
            const isWin = puzzlePieces.every((val, index) => val === index);
            if (isWin && puzzleBoard.children.length > 0) {
                // Remove borders to show full image
                Array.from(puzzleBoard.children).forEach(child => {
                    child.style.boxShadow = 'none';
                    child.style.border = 'none';
                    child.style.borderRadius = '0';
                    // MAGIA: Aparecen las letras al ganar!
                    child.style.backgroundImage = `url(${puzzleImageWithText})`;
                });
                puzzleBoard.style.gap = '0';
                puzzleBoard.style.padding = '0';

                setTimeout(() => {
                    for (let i = 0; i < 100; i++) {
                        hearts.push(new FloatingHeart(width / 2, height / 2, true));
                    }
                }, 400);
            } else {
                puzzleBoard.style.gap = '2px';
                puzzleBoard.style.padding = '5px';
            }
        }

        // RELOJ DE AMOR LOGIC
        const startDate = new Date('2026-05-10T00:00:00');

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            const timerDisplay = document.getElementById('timer-display');
            if (timerDisplay) {
                timerDisplay.innerText = `${days} días, ${hours} hrs, ${minutes} min, ${seconds} seg`;
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // MENSAJE SECRETO LOGIC
        const vaultBtn = document.getElementById('vault-btn');
        const vaultModal = document.getElementById('vault-modal');
        const closeVault = document.getElementById('close-vault');
        const vaultContent = document.getElementById('vault-content');

        function resetVault() {
            vaultContent.innerHTML = `
                <p style="font-size: 1.5rem; margin-bottom: 20px; font-family: 'Cinzel', serif;">Ingresa nuestra fecha especial:</p>
                <input type="text" id="vault-code" placeholder="Ej:  " style="padding: 15px; font-size: 2rem; border-radius: 10px; border: 2px solid #38ef7d; text-align: center; color: #333; margin-bottom: 30px; width: 80%; max-width: 300px; outline: none; box-shadow: 0 0 20px rgba(56, 239, 125, 0.4);">
                <br>
                <button class="heart-btn" id="vault-submit" style="background: linear-gradient(135deg, #11998e, #38ef7d); font-size: 1.5rem;">Desbloquear</button>
            `;
            document.getElementById('vault-submit').addEventListener('click', checkVault);
        }

        if (vaultBtn) {
            vaultBtn.addEventListener('click', () => {
                vaultModal.classList.remove('hidden-album');
                resetVault();
            });
        }

        if (closeVault) {
            closeVault.addEventListener('click', () => {
                vaultModal.classList.add('hidden-album');
            });
        }

        function checkVault() {
            const inputVal = document.getElementById('vault-code').value;
            const cleanInput = inputVal.replace(/[\s,]/g, '');

            // Si pone CUALQUIERA de las 3 fechas (6, 109, 104), lo dejamos pasar
            if (cleanInput === '6' || cleanInput === '109' || cleanInput === '104') {
                vaultContent.innerHTML = `
                    <p style="font-size: 3rem; font-family: 'Dancing Script', cursive; margin-bottom: 40px; text-shadow: 0 0 20px rgba(255,0,127,0.8);">¿Recuerdas cada momento?</p>
                    <div style="display: flex; justify-content: center; gap: 30px; position: relative; width: 100%; height: 100px;">
                        <button class="heart-btn" id="vault-yes" style="font-size: 1.5rem; padding: 15px 40px;">Sí</button>
                        <button class="heart-btn" id="vault-no" style="font-size: 1.5rem; padding: 15px 40px; background: #666; position: relative; transition: top 0.2s, left 0.2s;">No</button>
                    </div>
            `;

                document.getElementById('vault-yes').addEventListener('click', () => {
                    vaultContent.innerHTML = `<h1 style="font-size: clamp(3rem, 15vw, 6rem); text-align: center; color: #ff007f; font-family: 'Dancing Script', cursive; text-shadow: 0 0 50px #ff007f; animation: textPulse 1s infinite alternate; word-break: break-word; max-width: 90vw; line-height: 1.2;">¡Te amoooooooooooo!</h1>`;
                    for (let i = 0; i < 150; i++) {
                        hearts.push(new FloatingHeart(width / 2, height / 2, true));
                    }
                });

                // Botón NO que escapa
                const btnNo = document.getElementById('vault-no');
                const moveBtn = () => {
                    btnNo.style.position = 'absolute';
                    btnNo.style.left = (Math.random() * 60 + 20) + '%';
                    btnNo.style.top = (Math.random() * 100 - 50) + 'px';
                };
                btnNo.addEventListener('mouseover', moveBtn);
                btnNo.addEventListener('click', moveBtn);
            } else {
                alert('Clave incorrecta. Pista: Es la fecha o el código especial.');
            }
        }

        // Animation Loop
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Handle Warp Factor easing
            if (isWarping) {
                warpFactor += (1 - warpFactor) * 0.02; // Smooth acceleration
            } else {
                warpFactor += (0 - warpFactor) * 0.05; // Smooth deceleration
            }

            // Smooth 3D tilt interpolation for the card (via CSS variables)
            currentXAxis += (targetXAxis - currentXAxis) * 0.1;
            currentYAxis += (targetYAxis - currentYAxis) * 0.1;
            card.style.setProperty('--rx', `${currentXAxis} deg`);
            card.style.setProperty('--ry', `${-currentYAxis} deg`);

            // Draw Stars
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            // Draw Planets (sorted by Z depth so closer planets draw on top)
            planets.sort((a, b) => b.z - a.z);
            for (let i = 0; i < planets.length; i++) {
                planets[i].update();
                planets[i].draw();
            }

            // Draw Constellation Lines (only when not in warp speed)
            if (warpFactor < 0.1) {
                for (let i = 0; i < particles.length; i++) {
                    const dx = mouseX - particles[i].sx;
                    const dy = mouseY - particles[i].sy;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.moveTo(mouseX, mouseY);
                        ctx.lineTo(particles[i].sx, particles[i].sy);
                        ctx.strokeStyle = `rgba(255, 102, 178, ${0.15 - distance / 1000})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            // Draw Floating Hearts
            for (let i = hearts.length - 1; i >= 0; i--) {
                hearts[i].update();
                hearts[i].draw();
                if (hearts[i].isExplosion && hearts[i].life <= 0) {
                    hearts.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
